<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>神大食鑑　QUESTION</title>
	<link href="css/style.css" rel="stylesheet">
	<link href="css/tag.css" rel="stylesheet">
</head>

<body>
	<div class="page">
		<header>
			<div class="title_logo">
				<a  href="JEnD.html">
					<img src="img/title_logo.png" alt="神大食鑑" width="161.5px" height="42.5px">
				</a>
			</div>
			<div  class="home_logo">
				<a href="JEnD.html">
					<img src="img/home_logo.png" alt="home" width="56px" height="45px">
				</a>
			</div>
			<div class="search_logo">
				<a href="QUESTION.html">
					<img src="img/search_logo.png" alt="search" width="56px" height="45px">
				</a>
			</div>
		</header>

		<main>
			<div class="layout">
				<div class="title">
					<img src="img/tenmei_point.png" class="point" alt="▶︎" width="32px" height="32px">
					<div class="tagkensaku">
						<h1>質問</h1>
					</div>
				</div>

				<div class="question">
					<p>今からどのくらい時間ある？</p>
					<div class="sentakushi">
						<input type="checkbox" id="time_cb1" name="time" value="1" onclick="time_cb(this)">
						<label for="time_cb1" class="cb_design">１時間</label>
						<input type="checkbox" id="time_cb2" name="time" value="2" onclick="time_cb(this)">
						<label for="time_cb2" class="cb_design">１時間以上</label>
						<input type="checkbox" id="time_cb3" name="time" value="3" onclick="time_cb(this)">
						<label for="time_cb3" class="cb_design">２時間以上</label>
						<input type="checkbox" id="time_cb4" name="time" value="4" onclick="time_cb(this)">
						<label for="time_cb4" class="cb_design">テイクアウト</label>
					</div>
				</div>
				<div class="question">
					<p>予算はどのくらい？</p>
					<div class="sentakushi">
						<input type="checkbox" id="yosan_cb1" name="yosan" value="1" onclick="yosan_cb(this)">
						<label for="yosan_cb1" class="cb_design">〜1000円</label>
						<input type="checkbox" id="yosan_cb2" name="yosan" value="2" onclick="yosan_cb(this)">
						<label for="yosan_cb2" class="cb_design">1000円〜</label>
					</div>
				</div>
				<div class="question">
					<p>食べたいものは？<br>~その１~</p>
					<div class="sentakushi">
						<input type="checkbox" id="genre1_cb1" name="genre1" value="1" onclick="genre1_cb(this)">
						<label for="genre1_cb1" class="cb_design">和食</label>
						<input type="checkbox" id="genre1_cb2" name="genre1" value="2" onclick="genre1_cb(this)">
						<label for="genre1_cb2" class="cb_design">洋食</label>
						<input type="checkbox" id="genre1_cb3" name="genre1" value="3" onclick="genre1_cb(this)">
						<label for="genre1_cb3" class="cb_design">中華・アジアン</label>
						<input type="checkbox" id="genre1_cb4" name="genre1" value="4" onclick="genre1_cb(this)">
						<label for="genre1_cb4" class="cb_design">ラーメン</label>
						<input type="checkbox" id="genre1_cb5" name="genre1" value="5" onclick="genre1_cb(this)">
						<label for="genre1_cb5" class="cb_design">軽食・甘いもの</label>
					</div>
				</div>
				<div class="question">
					<p>食べたいものは？<br>~その２~（任意）</p>
					<div class="sentakushi">
						<input type="checkbox" id="genre2_cb1" name="genre2" value="1" onclick="genre2_cb(this)">
						<label for="genre2_cb1" class="cb_design">辛いものもある</label>
						<input type="checkbox" id="genre2_cb2" name="genre2" value="2" onclick="genre2_cb(this)">
						<label for="genre2_cb2" class="cb_design">デザートもある</label>
						<input type="checkbox" id="genre2_cb3" name="genre2" value="3" onclick="genre2_cb(this)">
						<label for="genre2_cb3" class="cb_design">ガッツリもある</label>
					</div>
				</div>
				<div class="question">
					<p>他に重視する点は？</p>
					<div class="sentakushi">
						<input type="checkbox" id="point_cb1" name="point" value="1" onclick="point_cb(this)">
						<label for="point_cb1" class="cb_design">白楽駅から近い</label>
						<input type="checkbox" id="point_cb2" name="point" value="2" onclick="point_cb(this)">
						<label for="point_cb2" class="cb_design">神大から近い</label>
						<input type="checkbox" id="point_cb3" name="point" value="3" onclick="point_cb(this)">
						<label for="point_cb3" class="cb_design">一人でも行きやすい</label>
						<input type="checkbox" id="point_cb4" name="point" value="4" onclick="point_cb(this)">
						<label for="point_cb4" class="cb_design">大人数で行ける</label>
						<input type="checkbox" id="point_cb5" name="point" value="5" onclick="point_cb(this)">
						<label for="point_cb5" class="cb_design">お店でゆっくりしたい</label>
					</div>
				</div>
				

				<div class="anser">
					<p onclick="kensaku();">お店を探す</p>
				</div>
			</div>
		</main>
		
		<footer>
			<a href="https://instagram.com/kanagawa.hfe?igshid=YmMyMTA2M2Y=">
				<p>人間工学研究室 Instagram</p>
			</a>
			<a href="https://www.hfe.ie.kanagawa-u.ac.jp/index.php">
				<p>人間工学研究室 HP</p>
			</a>
			<br>
			<p>&copy; 2023 人間工学研究室</p>
		</footer>

		<script src="kensaku.js" charset="utf-8" async></script>
		<script src="checkbox.js" charset="utf-8" async></script>
	</div>
</body>

</html>
